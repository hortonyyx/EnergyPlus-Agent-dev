services:
  energyplus-mcp:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ../src:/app/src
      - ../main.py:/app/main.py
      - ../scripts:/app/scripts
      - ../Tool_scripts:/app/Tool_scripts
      - ../skills:/app/skills
      - ../tests:/app/tests
      - ../data:/app/data
      - ../output:/app/output
    environment:
      - UV_CACHE_DIR=/app/.cache/uv
      - HOME=/app
    env_file:
      - ../.env
    user: "1000:1000"
    command: uv run watchfiles "python main.py mcp-server --transport http --host 0.0.0.0 --port 8000" src main.py
    restart: unless-stopped
