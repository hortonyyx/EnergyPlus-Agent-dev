<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 1498" role="img" aria-label="Thermal zoning: candidate red zone partitions iterate over the vector redraw and settle into eight thermal zones">
  <defs>
    <style>
      .wall   { fill: none; stroke: #2f4a57; stroke-width: 8; stroke-linecap: square; stroke-linejoin: miter; }
      .col    { fill: #3a525e; }
      .window { fill: none; stroke: #2f76c4; stroke-width: 13; stroke-linecap: butt; }
      .door   { fill: none; stroke: #d98a3d; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }

      #vector-redraw-base { animation: baseFade .52s 0.34s both; }
      .search-layer { opacity: 1; }
      .search-field { fill: rgba(210,74,48,.10); stroke: none; opacity: 0; animation: fieldPulse 2.02s 0.48s both; }
      .candidate-cell {
        fill: rgba(232,96,74,.24);
        stroke: #982414;
        stroke-width: .85;
        stroke-linejoin: miter;
        opacity: 0;
        transform-box: fill-box;
        transform-origin: center;
        vector-effect: non-scaling-stroke;
      }
      .cell-mid { fill: rgba(210,74,48,.22); }
      .cell-dark { fill: rgba(181,58,34,.20); }
      .cell-1  { animation: cellScanA .82s 0.50s both; }
      .cell-2  { animation: cellScanB .78s 0.62s both; }
      .cell-3  { animation: cellScanA .84s 0.74s both; }
      .cell-4  { animation: cellScanC .80s 0.86s both; }
      .cell-5  { animation: cellScanB .88s 1.02s both; }
      .cell-6  { animation: cellScanA .78s 1.16s both; }
      .cell-7  { animation: cellScanC .84s 1.30s both; }
      .cell-8  { animation: cellScanB .76s 1.44s both; }
      .cell-9  { animation: cellScanA .78s 1.58s both; }
      .cell-10 { animation: cellScanC .82s 1.70s both; }
      .cell-11 { animation: cellScanB .76s 1.82s both; }
      .cell-12 { animation: cellScanA .78s 1.96s both; }
      .cell-13 { animation: cellScanC .66s 2.08s both; }
      .search-line {
        fill: none;
        stroke: #982414;
        stroke-width: 1.35;
        stroke-linecap: square;
        stroke-linejoin: miter;
        opacity: 0;
        vector-effect: non-scaling-stroke;
      }
      .try-a { animation: tryA 1.08s 0.54s both; }
      .try-b { animation: tryB 1.04s 0.92s both; }
      .try-c { animation: tryC 1.02s 1.28s both; }
      .try-d { animation: tryD .86s 1.74s both; }
      .probe {
        stroke-width: 1.05;
        opacity: 0;
        animation: probeFlicker .62s both;
      }
      .probe-1 { animation-delay: 0.58s; }
      .probe-2 { animation-delay: 0.78s; }
      .probe-3 { animation-delay: 1.00s; }
      .probe-4 { animation-delay: 1.24s; }
      .probe-5 { animation-delay: 1.50s; }
      .probe-6 { animation-delay: 1.76s; }
      .zone-fill {
        fill: rgba(232, 96, 74, .32);
        stroke: #982414;
        stroke-width: .85;
        stroke-linejoin: miter;
        transform-box: fill-box;
        transform-origin: center;
        vector-effect: non-scaling-stroke;
      }
      .zone-mid { fill: rgba(210,74,48,.30); }
      .zone-dark { fill: rgba(181,58,34,.28); }
      .final-zones {
        opacity: 0;
        animation: finalSettle .66s 2.50s both;
      }

      @keyframes baseFade {
        from { opacity: 1; }
        to { opacity: .28; }
      }
      @keyframes fieldPulse {
        0% { opacity: 0; }
        18%, 86% { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes cellScanA {
        0% { opacity: 0; transform: translate(-7px,-2px) scale(.985); }
        24%, 64% { opacity: .72; transform: translate(0,0) scale(1); }
        100% { opacity: 0; transform: translate(5px,1px) scale(1.012); }
      }
      @keyframes cellScanB {
        0% { opacity: 0; transform: translate(6px,2px) scale(.99); }
        20%, 58% { opacity: .64; transform: translate(0,0) scale(1); }
        100% { opacity: 0; transform: translate(-4px,-2px) scale(1.01); }
      }
      @keyframes cellScanC {
        0% { opacity: 0; transform: translate(2px,-6px) scale(.988); }
        22%, 66% { opacity: .68; transform: translate(0,0) scale(1); }
        100% { opacity: 0; transform: translate(0,4px) scale(1.008); }
      }
      @keyframes tryA {
        0% { opacity: 0; transform: translate(-6px,-2px); }
        22%, 62% { opacity: .64; transform: translate(0,0); }
        100% { opacity: 0; transform: translate(7px,1px); }
      }
      @keyframes tryB {
        0% { opacity: 0; transform: translate(8px,0); }
        22%, 66% { opacity: .68; transform: translate(0,0); }
        100% { opacity: 0; transform: translate(-5px,2px); }
      }
      @keyframes tryC {
        0% { opacity: 0; transform: translate(-4px,5px); }
        22%, 66% { opacity: .70; transform: translate(0,0); }
        100% { opacity: 0; transform: translate(4px,-3px); }
      }
      @keyframes tryD {
        0% { opacity: 0; transform: translate(3px,-4px); }
        24%, 72% { opacity: .74; transform: translate(0,0); }
        100% { opacity: 0; transform: translate(0,0); }
      }
      @keyframes probeFlicker {
        0%, 100% { opacity: 0; }
        18%, 34%, 58% { opacity: .7; }
        28%, 50% { opacity: .22; }
      }
      @keyframes finalSettle {
        0% { opacity: 0; transform: scale(.994); transform-origin: center; }
        100% { opacity: 1; transform: scale(1); transform-origin: center; }
      }
    </style>
    <clipPath id="planEnvelopeClip">
      <rect x="40" y="40" width="1940" height="1330"/>
    </clipPath>
  </defs>

  <g id="vector-redraw-base">
    <g id="walls">
      <rect class="wall" x="845" y="40" width="425" height="335"/>
      <line class="wall" x1="390" y1="455" x2="390" y2="1395"/>
      <rect class="wall" x="40" y="40" width="1940" height="1330"/>
      <line class="wall" x1="40" y1="455" x2="390" y2="455"/>
      <line class="wall" x1="40" y1="725" x2="352" y2="725"/>
      <line class="wall" x1="40" y1="1030" x2="390" y2="1030"/>
      <line class="wall" x1="1660" y1="455" x2="1660" y2="1030"/>
      <line class="wall" x1="1660" y1="455" x2="1980" y2="455"/>
      <line class="wall" x1="1660" y1="725" x2="1980" y2="725"/>
      <line class="wall" x1="1660" y1="1030" x2="1980" y2="1030"/>
      <path class="wall" d="M560 490 V455 H750 V865 H560 V510"/>
      <rect class="wall" x="750" y="455" width="110" height="410"/>
      <rect class="wall" x="860" y="455" width="135" height="165"/>
      <rect class="wall" x="560" y="865" width="400" height="165"/>
      <rect class="wall" x="1080" y="455" width="135" height="165"/>
      <rect class="wall" x="1215" y="455" width="90" height="410"/>
      <rect class="wall" x="1305" y="455" width="210" height="410"/>
      <rect class="wall" x="1110" y="865" width="405" height="165"/>
    </g>

    <g id="columns">
      <rect class="col" x="27" y="27" width="26" height="26" rx="1"/>
      <rect class="col" x="1967" y="27" width="26" height="26" rx="1"/>
      <rect class="col" x="27" y="1357" width="26" height="26" rx="1"/>
      <rect class="col" x="1967" y="1357" width="26" height="26" rx="1"/>
      <rect class="col" x="31" y="311" width="18" height="18" rx="1"/>
      <rect class="col" x="31" y="1161" width="18" height="18" rx="1"/>
      <rect class="col" x="1971" y="311" width="18" height="18" rx="1"/>
      <rect class="col" x="1971" y="1161" width="18" height="18" rx="1"/>
      <rect class="col" x="421" y="1361" width="18" height="18" rx="1"/>
      <rect class="col" x="793" y="1349" width="18" height="18" rx="1"/>
      <rect class="col" x="1221" y="1361" width="18" height="18" rx="1"/>
      <rect class="col" x="1561" y="1361" width="18" height="18" rx="1"/>
    </g>

    <g id="windows">
      <line class="window" x1="175" y1="40" x2="305" y2="40"/>
      <line class="window" x1="450" y1="40" x2="580" y2="40"/>
      <line class="window" x1="1405" y1="40" x2="1535" y2="40"/>
      <line class="window" x1="1685" y1="40" x2="1815" y2="40"/>
      <line class="window" x1="185" y1="1370" x2="315" y2="1370"/>
      <line class="window" x1="495" y1="1370" x2="625" y2="1370"/>
      <line class="window" x1="1395" y1="1370" x2="1525" y2="1370"/>
      <line class="window" x1="1725" y1="1370" x2="1855" y2="1370"/>
      <line class="window" x1="40" y1="690" x2="40" y2="760"/>
      <line class="window" x1="1980" y1="602.5" x2="1980" y2="687.5"/>
      <line class="window" x1="1980" y1="942.5" x2="1980" y2="1027.5"/>
    </g>

    <g id="doors">
      <path class="door" d="M390 590 L330 590 M330 590 A60 60 0 0 1 390 530"/>
      <path class="door" d="M390 880 L330 880 M330 880 A60 60 0 0 1 390 820"/>
      <path class="door" d="M390 1200 L330 1200 M330 1200 A60 60 0 0 1 390 1140"/>
      <path class="door" d="M1660 590 L1720 590 M1720 590 A60 60 0 0 0 1660 530"/>
      <path class="door" d="M1660 880 L1720 880 M1720 880 A60 60 0 0 0 1660 820"/>
      <path class="door" d="M1180 375 L1180 311 M1180 311 A64 64 0 0 0 1116 375"/>
      <path class="door" d="M650 455 L650 515 M650 515 A60 60 0 0 1 590 455"/>
      <path class="door" d="M930 620 L930 560 M930 560 A60 60 0 0 0 870 620"/>
      <path class="door" d="M1150 620 L1150 560 M1150 560 A60 60 0 0 0 1090 620"/>
      <path class="door" d="M1390 455 L1390 515 M1390 515 A60 60 0 0 1 1330 455"/>
      <path class="door" d="M650 865 L650 925 M650 925 A60 60 0 0 1 590 865"/>
      <path class="door" d="M1430 865 L1430 925 M1430 925 A60 60 0 0 1 1370 865"/>
      <path class="door" d="M960 1370 L960 1306 M960 1306 A64 64 0 0 0 896 1370"/>
      <path class="door" d="M1088 1370 L1088 1306 M1088 1306 A64 64 0 0 1 1152 1370"/>
    </g>
  </g>

  <!-- Candidate partition search: split lines flicker along wall/grid candidates, then converge to stable zones. -->
  <g class="search-layer" clip-path="url(#planEnvelopeClip)" aria-hidden="true">
    <rect class="search-field" x="40" y="40" width="1940" height="1330"/>
    <rect class="candidate-cell cell-1" x="40" y="40" width="805" height="407"/>
    <rect class="candidate-cell cell-mid cell-2" x="853" y="40" width="1127" height="407"/>
    <rect class="candidate-cell cell-dark cell-3" x="1515" y="463" width="465" height="559"/>
    <rect class="candidate-cell cell-mid cell-4" x="568" y="463" width="450" height="559"/>
    <rect class="candidate-cell cell-5" x="398" y="1038" width="1582" height="332"/>
    <rect class="candidate-cell cell-dark cell-6" x="40" y="463" width="512" height="559"/>
    <rect class="candidate-cell cell-mid cell-7" x="1018" y="463" width="489" height="559"/>
    <rect class="candidate-cell cell-8" x="853" y="40" width="409" height="407"/>
    <rect class="candidate-cell cell-dark cell-9" x="40" y="1038" width="342" height="332"/>
    <rect class="candidate-cell cell-mid cell-10" x="568" y="463" width="939" height="270"/>
    <rect class="candidate-cell cell-11" x="1278" y="40" width="702" height="407"/>
    <rect class="candidate-cell cell-dark cell-12" x="568" y="463" width="939" height="559"/>
    <rect class="candidate-cell cell-mid cell-13" x="1523" y="463" width="457" height="559"/>
    <path class="search-line try-a" d="M40 455H1980 M40 1030H1980 M845 40V455 M1270 40V455 M560 455V1030 M1660 455V1030 M390 1030V1370"/>
    <path class="search-line try-b" d="M40 455H1980 M40 725H390 M1660 725H1980 M40 1030H1980 M750 455V1030 M1515 455V1030 M390 1030V1370 M845 40V455"/>
    <path class="search-line try-c" d="M40 455H1980 M40 1030H1980 M845 40V455 M1270 40V455 M560 455V1030 M1515 455V1030 M390 1030V1370"/>
    <path class="search-line try-d" d="M40 455H1980 M40 1030H1980 M845 40V455 M1270 40V455 M560 455V1030 M1515 455V1030 M390 1030V1370"/>
    <path class="search-line probe probe-1" d="M390 455V1030 M950 455V1030 M1515 725H1980"/>
    <path class="search-line probe probe-2" d="M750 455V1030 M1660 455V1030 M40 725H390"/>
    <path class="search-line probe probe-3" d="M560 455V1030 M1515 455V1030 M845 40V455"/>
    <path class="search-line probe probe-4" d="M390 1030V1370 M40 725H390 M1660 725H1980"/>
    <path class="search-line probe probe-5" d="M568 455V1030 M1507 455V1030 M1270 40V455"/>
    <path class="search-line probe probe-6" d="M853 40V455 M1262 40V455 M1523 455V1030"/>
  </g>

  <g id="final-thermal-zones" class="final-zones">
    <rect class="zone-fill" x="40" y="40" width="797" height="407"/>
    <rect class="zone-fill zone-mid" x="853" y="40" width="409" height="407"/>
    <rect class="zone-fill zone-dark" x="1278" y="40" width="702" height="407"/>
    <rect class="zone-fill zone-mid" x="40" y="463" width="512" height="559"/>
    <rect class="zone-fill" x="568" y="463" width="939" height="559"/>
    <rect class="zone-fill zone-dark" x="1523" y="463" width="457" height="559"/>
    <rect class="zone-fill zone-dark" x="40" y="1038" width="342" height="332"/>
    <rect class="zone-fill zone-mid" x="398" y="1038" width="1582" height="332"/>
  </g>
</svg>
