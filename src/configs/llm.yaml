# Multi-section LLM config (2026-05-07: per-subagent overrides).
#
# Each subagent calls `create_llm(node_name="<name>")` with its own name:
#   intake / zone / material / schedule / construction / surface /
#   fenestration / hvac / people / lights
#
# Resolution rule (see src/agent/llm.py:load_llm_section):
#   1) if a section matching `node_name` exists → use it
#   2) else → fall back to `default`
#
# To override one subagent only, add a section keyed by its node name (any
# subset of fields; missing fields are NOT inherited from `default` — the whole
# section is parsed standalone, so list every field you need).
#
# Required env vars (put in .env):
#   - DEEPSEEK_API_KEY=sk-...   (downstream default)
#   - ANTHROPIC_API_KEY=sk-...  (intake; optional — only if you drive intake
#                                via the Anthropic API rather than the half-manual
#                                Claude Code session described in new_case_guide.md)
#
# Example: override surface_agent to a stronger model while leaving the other
# 8 downstream subagents on the `default` DeepSeek config:
#
#   surface:
#     provider: anthropic
#     api_key: ${oc.env:ANTHROPIC_API_KEY,null}
#     model_name: claude-sonnet-4-6
#     temperature: 0.3
#     max_tokens: 64000

default:
  provider: openai                                    # OpenAI-compatible protocol
  base_url: ${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com}
  api_key: ${oc.env:DEEPSEEK_API_KEY,null}
  model_name: deepseek-v4-pro
  temperature: 0.7
  max_tokens: 64000
  # Disable v4-pro thinking mode: ReAct multi-turn loops would otherwise need to
  # pass reasoning_content back each turn, which langchain_openai doesn't do →
  # 400 "reasoning_content must be passed back to the API". See pipeline_run.log
  # 2026-05-07 sm_16_newarch material_agent failure.
  extra_body:
    thinking:
      type: disabled

intake:
  provider: anthropic
  base_url: ${oc.env:ANTHROPIC_BASE_URL,null}
  api_key: ${oc.env:ANTHROPIC_API_KEY,null}
  model_name: claude-opus-4-7
  temperature: 0.7
  max_tokens: 64000

# Two-step intake (2026-05-29, B1.5.c). intake_node runs phase 2 (vector JSON ->
# IntakeOutput) when phase-1 vectors are provided (half-manual dev flow:
# --phase1-from), else falls back to the legacy single-step `intake` section.
#
# intake_phase2: text-only topology reasoning over phase-1 vectors. Read by
# src/agent/phase2.py via a RAW OpenAI client (not langchain): phase 2 is
# single-shot and WANTS DeepSeek thinking ON (langchain_openai would burn the
# output budget on reasoning_content). thinking=enabled here is deliberate and
# differs from `default` (which disables it for the ReAct downstream loops).
intake_phase2:
  provider: openai
  base_url: ${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com}
  api_key: ${oc.env:DEEPSEEK_API_KEY,null}
  model_name: deepseek-v4-pro
  temperature: 0.3
  max_tokens: 64000
  extra_body:
    thinking:
      type: enabled

# intake_phase1 (FUTURE, full-auto two-step): a multimodal VLM that turns images
# into phase-1 vector JSON, so the pipeline can run without a Claude Code
# session. Not wired yet — dev currently does phase 1 half-manually in a Claude
# Code Opus session. When enabled, intake_node's `else` branch would call it.
# intake_phase1:
#   provider: anthropic
#   base_url: ${oc.env:ANTHROPIC_BASE_URL,null}
#   api_key: ${oc.env:ANTHROPIC_API_KEY,null}
#   model_name: claude-opus-4-7
#   temperature: 0.4
#   max_tokens: 64000

# Per-subagent partition (2026-05-07, ref: baseline run
# test_data/test_baseline/runs/2026-05-07_sm_16_newarch_v4pro_no_sim_v1/notes.md §3.2):
#   default (pro) — surface / construction / fenestration: baseline 实证 flash
#     会漏 window construction / 几何瓶颈，必须 pro。不再单独写 section，吃 default。
#   flash overrides — zone / material / schedule / hvac / people / lights:
#     CRUD-style 节点，flash 够用。lights/people/hvac 在 baseline 实证；
#     zone/material/schedule 暂未 isolated 验证，沿用 new_case_guide.md:243 判断。
#     若哪个 flash 节点在新 case 上掉链，把对应段删掉即可 fallback 到 default(pro)。

zone: &flash
  provider: openai
  base_url: ${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com}
  api_key: ${oc.env:DEEPSEEK_API_KEY,null}
  model_name: deepseek-v4-flash
  temperature: 0.7
  max_tokens: 64000
  extra_body:
    thinking:
      type: disabled

material: *flash
schedule: *flash
hvac: *flash
people: *flash
lights: *flash
