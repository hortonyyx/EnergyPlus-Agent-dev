# ============================================================
#  本测试样例 · 模型配置（按建模阶段 / 节点分段）
#
#  · 想给某个阶段或某个下游节点换模型：改对应段即可，存盘后直接重跑本样例。
#  · 不改：保持下方默认组合（与全局 src/configs/llm.yaml 一致：几何节点 pro，CRUD 节点 flash）。
#  · API key 等放 .env，这里用环境变量引用，一般不用动。
#  · 每段都要写全字段——缺的字段不会从别的段继承。
# ============================================================

# 阶段 0 · 识图（0_reading）
#   把建筑图纸读成矢量 JSON。目前由人工 / Claude Code 会话完成，不经 API，无需在此配置。

# 阶段 1 · 校正（1_correction）
#   把识图矢量 JSON 校正成自洽的 CorrectedGeometry。单次调用，开启思考。
#   （阶段 2/3 几何 + 阶段 5 装配是确定性代码、无 LLM；阶段 4 物理 4_mep 若要单独换模型，
#    在全局 llm.yaml 加 intake_mep 段，缺省回退本段。）
intake_correction:
  provider: openai
  base_url: ${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com}
  api_key: ${oc.env:DEEPSEEK_API_KEY,null}
  model_name: deepseek-v4-pro
  temperature: 0.3
  max_tokens: 64000
  reasoning_effort: high   # 推理强度：high（默认）/ max（更彻底、更慢更贵）
  extra_body:
    thinking:
      type: enabled        # 校正单次推理需要思考，保持 enabled

# 阶段三 · 下游建模（9 个子节点）
#   默认分两档：几何节点（墙面/构造/门窗）用 pro，CRUD 节点用 flash。
#   想单独调某个节点：把它那行的 *pro / *flash 换成另一档，
#   或直接替成一整段自定义配置（整段写全字段）。

# 几何节点：几何瓶颈，用强模型 pro。
surface: &pro              # 墙面
  provider: openai
  base_url: ${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com}
  api_key: ${oc.env:DEEPSEEK_API_KEY,null}
  model_name: deepseek-v4-pro
  temperature: 0.7
  max_tokens: 64000
  extra_body:
    thinking:
      type: disabled       # 下游是多轮 ReAct，关闭思考（避免 reasoning_content 回传 400）
construction: *pro         # 构造
fenestration: *pro         # 门窗

# CRUD 节点：增删改型，用省模型 flash。
zone: &flash               # 分区
  provider: openai
  base_url: ${oc.env:DEEPSEEK_BASE_URL,https://api.deepseek.com}
  api_key: ${oc.env:DEEPSEEK_API_KEY,null}
  model_name: deepseek-v4-flash
  temperature: 0.7
  max_tokens: 64000
  extra_body:
    thinking:
      type: disabled
material: *flash           # 材料
schedule: *flash           # 作息
hvac: *flash               # 暖通
people: *flash             # 人员
lights: *flash             # 照明

# 兜底：上面没列到的节点用这个（一般用不到）。
default: *pro
