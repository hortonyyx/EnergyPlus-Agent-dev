# ============================================================================
# 几何校正 — 确定性核 容差配置
# ============================================================================
# 这些常数驱动 src/agent/correction/deterministic.py（phase2a 之后、phase2b 之前
# 跑的确定性核）。把它们抽成配置文件，是为了：
#   1. 单一真源——核不再硬编码常数，消除「A0 文档 registry vs Python 常数」漂移；
#   2. 方便实验——改这里的数值即可测不同颗粒度的效果，不用动代码。
#
# 值的依据（standards basis）来自 PartA-correction/A0_contract.md §4 容差 registry；
# 改值前请同步那篇文档的口径。所有长度单位 = 米 (m)。
#
# 覆盖方式：设环境变量 EP_AGENT_CORRECTION_CONFIG=<path> 指向另一份 YAML，即对该次
# run 生效（与 EP_AGENT_LLM_CONFIG 的 per-case 模式一致）；不设则用本文件。
#
# ---------------------------------------------------------------------------
# 【核心概念：聚类 ≠ 吸附，是两步】
#   第1步 聚类(identity)：把"本是同一道意图墙"的近邻坐标合成一个代表值
#         —— 这步消跨层抖动(4.90/4.95→一条轴)，由 axis_jitter_tol_m 控制。
#   第2步 吸附(规整)：把代表值 round 到干净栅格(灭 4.925 这种 mm 级均值)
#         —— 由 structural_snap_grid_m 控制。
#   颗粒度(栅格)不负责合并身份；调粗栅格对消抖动毫无帮助，只会吃掉小特征。
# ---------------------------------------------------------------------------

correction:

  # ====== 第1步：同轴身份聚类 ======
  axis_jitter_tol_m: 0.050
  # 约束：两条坐标轴相距 ≤ 此值 → 判为"同一道意图墙/轴"，合成一个代表值。
  # 作用：这是消除跨层抖动(同一道墙在不同楼层被识成 4.90 / 4.95)的关键一步。
  # 调大 → 合并更激进，可能并掉两道真实相邻的薄墙(误并)；
  # 调小 → 抖动合不掉，碎片/重影墙回来。
  # 上界含义：超过此值、且拓扑证据说它们是不同墙 → 不静默合并，升级为
  #           reference_or_identity_ambiguity 交 A3 仲裁(见 A0 §1.4 / §3)。
  # 对应 A0：AXIS_JITTER_TOL = 50mm (= SNAP_GRID，M/2 模数)。

  # ====== 第2步：结构轴吸附栅格 ======
  structural_snap_grid_m: 0.050
  # 约束：房间 / 墙 / 外包的 x、y 代表值，吸附到此栅格的整数倍。
  # 作用：身份聚类已经把抖动合并完，这步只做"规整"——把 4.925 这种簇均值
  #       拉回干净栅格值(4.90 或 4.95)，让整条管线坐标口径统一、可肉眼核对。
  # 颗粒度选择(实验入口)：
  #   0.050(默认)：GB/T-50002 M/2 模数，= 隔墙厚度粒度；保住亚米级真实特征
  #               (竖井 / 窄走廊 / 卫生间)，对房间面积影响可忽略。【推荐】
  #   0.100      ：M 模数，输出数字更圆整；仍保住 ~100mm 级特征。可在宽松
  #               profile(use_grouped_rooms / perimeter_core)下用。
  #   0.500      ：不建议作结构栅格——会塌掉亚米级真实特征、扭曲小房间面积，
  #               且对消抖动无帮助(那是第1步干的)。能耗上虽可忽略，但伤拓扑。
  # 硬约束关系：必须 ≤ min_edge_length_m。吸附后代码会再过一遍碎片守卫
  #            (吸附可能把两条 ≥min_edge 的轴各自挪近到 < min_edge)，
  #            保证最终任意两轴间距 ≥ min_edge_length_m。
  # 对应 A0：SNAP_GRID = 50mm。

  # ====== 碎片守卫地板(防 EP 段错) ======
  min_edge_length_m: 0.100
  # 约束：最终任意两条规范轴的间距不得 < 此值；任一 cell 的边长 < 此值
  #       → 该 cell 标记 unsupported(不静默吞)。
  # 作用：结构性杜绝"退化碎片"(如 0.05m × 3m 的薄条)。跨层楼板/天花切配时，
  #       这类薄条会让 EnergyPlus 输入处理阶段段错(exit 139，.err 还没写就崩)。
  #       本守卫把这一整类崩溃变成"结构上不可能"。
  # 依据：EP very-small-vertex warning 阈值 ~0.01m，此处留约 10x 安全裕度。
  # 性质：hard_fail —— 低于它的几何不放行(合并 / 重吸附 / 标 unsupported)。
  # 对应 A0：MIN_EDGE_LENGTH = 0.10m。

  # ====== 输出精度 / 记账阈值 ======
  output_precision_m: 0.010
  # 约束：最终坐标的格式化精度；坐标移动量 > 此值才记一条 corrections[]
  #       (≤ 此值的微调算 normalization，A0 §2 规定不记账)。
  # 作用：(a) 控制 audit 噪声——避免每个 0.x mm 的浮点尾差都刷一条记录；
  #       (b) 兼作窗户吸附栅格的默认值(见下)。
  # 对应 A0：OUTPUT_PRECISION = 10mm (M/10 模数)。

  # ====== 窗户(分级：比结构更细) ======
  window_snap_grid_m: 0.010
  # 约束：窗户的 span(沿立面跨度)与 z(窗台/窗顶)吸附到此栅格。
  # 为何与结构分级：窗户【没有】跨层身份、也不参与碎片切配，所以吸结构栅格
  #   (50mm)对它毫无意义，反而直接伤 WWR(窗宽被 round 掉 ±25% 是常事)。
  #   窗的两个硬指标是 WWR 保真(±5%)与"必须落在父墙内"(否则 CHKSBS 部分重叠
  #   warning / 求解异常)，都要求细颗粒。默认 = output_precision_m(10mm)。

  window_clamp_to_parent: true
  # 约束：吸附后，把窗 span 钳进其所属 cell 在该立面方向的边界、把窗 z[sill,head]
  #       钳进所在楼层的 [z_floor, z_floor + ceiling_height]。
  # 作用：防"窗顶冒出墙顶 / 窗边伸出墙外"那类 CHKSBS partial-overlap。
  #       false 时只吸附不钳制(调试用，便于观察 LLM 原始越界程度)。

  # ====== 连接性补缝(端点→边界，#2.4) ======
  # 【与轴吸附是两类操作】轴吸附(structural_snap_grid)问"两坐标是不是同一道墙"
  # (身份，颗粒 50mm)；补缝问"一条墙线该不该接到边界上"(连接性，颗粒 300mm)。
  # 二者刻意分开(A0 §4)：补缝用更大的阈值，且只把"差一点够不到外墙"的 cell 边
  # 沿原方向拉到 footprint 边界，不做近邻轴合并。
  gap_close_threshold_m: 0.300
  # 约束：cell 的某条边若落在 footprint 边界内侧、距边界 ≤ 此值 → 把该边吸到
  #       footprint 边界(把房间封到外墙上)。
  # 作用：解决"内墙没顶到外墙、留小缝"——闭包不连续就形不成 zone(BEM 里是 fatal)。
  # 为何定 300mm 而非 A0 老值 100mm：两类错误代价极不对称——
  #   · 没闭合 = 致命(无 zone)；· 误闭合 = 罕见且轻(真实 <300mm 有意缝几乎不存在，
  #     且对 BEM 本就必须封)。代价不对称 + 经验(真建筑少有 <300mm 缝)→ 阈值往上。
  # 方向性：只把差一点够不到边界的边"向外"拉到 footprint，不会把内部边乱吸；
  #         门洞也照样闭合墙线(门是开在墙上的子面，zone 边界仍连续)。
  # 当前范围：仅 cell 边→footprint 边界(内墙→外墙，即图示那类)。内墙→内墙的
  #          连接性(隔墙没顶到另一道隔墙)是后续细化，风险更高、暂不做。
  # 硬约束关系：必须 > axis_jitter_tol_m(连接性比身份粗) 且 < gap_arbitration_band_m。

  gap_arbitration_band_m: 1.000
  # 约束：缝在 (gap_close_threshold, 此值] 区间 → 不在代码里自动闭合，升 A3 仲裁
  #       (门洞那类：墙线闭合+门作子面 vs 真开口)；≥ 此值 → 视作开放边界，交
  #       A3/zonification 判"该不该合成一个 zone"，不静默封墙。
  # 说明：当前确定性核只消费 gap_close_threshold(自动闭合段)；此值是给 A3(LLM)
  #       与文档的口径，代码暂不据此动作，仅参与不变量校验。

  # ---------------------------------------------------------------------------
  # 【未来扩展，当前未启用】按 method profile 分档结构栅格：
  #   room_identity   → 0.050 (每道隔墙都是热边界，全保真，永不丢墙)
  #   use_grouped_rooms / perimeter_core → 0.100 (内部坐标可放宽，输出更圆整)
  # 接法：core 读 geom 的 profile 字段后从此处取对应栅格。留待 method profile
  # 真正接进管线时再开。
  # ---------------------------------------------------------------------------
